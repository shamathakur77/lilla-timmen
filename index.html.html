<style>
:root{
  --paper:#FBF7EF;
  --card:#FFFDF8;
  --sky:#D8EAF3;
  --ink:#20302A;
  --ink-soft:rgba(32,48,42,.66);
  --sun:#F0B23E;
  --pine:#3F7159;
  --lingon:#C25749;
  --line:rgba(32,48,42,.14);
  --radius:20px;
  --disp:"Fraunces",Georgia,"Times New Roman",serif;
  --body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--body);
  font-size:16px;
  line-height:1.5;
  min-height:100dvh;
}
.wrap{max-width:480px;margin:0 auto;padding:0 18px 40px}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:var(--pine)}
:focus-visible{outline:3px solid var(--sun);outline-offset:2px;border-radius:6px}

/* ---------- sky ribbon (signature) ---------- */
.ribbon{
  margin:14px 0 0;border-radius:16px;border:1px solid var(--line);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(120deg,#EDEFEA,#DFE6E3);
  transition:background .6s ease;width:100%;text-align:left;
}
.ribbon.w-sun{background:linear-gradient(120deg,#FDE9B8,#D8EAF3)}
.ribbon.w-gray{background:linear-gradient(120deg,#E6EAE7,#D5DEE2)}
.ribbon.w-wet{background:linear-gradient(120deg,#C9D8E2,#B3C7D4)}
.ribbon.w-cold{background:linear-gradient(120deg,#EDF4F9,#D7E4EE)}
.ribbon svg{flex:0 0 34px}
.ribbon .temp{font-family:var(--mono);font-size:1.05rem;font-weight:600;white-space:nowrap}
.ribbon .cond{font-size:.86rem;color:var(--ink-soft);line-height:1.3}
.ribbon .hint{margin-left:auto;font-size:.72rem;color:var(--ink-soft);white-space:nowrap}

.override{
  display:none;margin-top:10px;padding:12px 14px;border:1px dashed var(--line);
  border-radius:14px;background:var(--card)
}
.override.open{display:block}
.override p{font-size:.85rem;color:var(--ink-soft);margin-bottom:8px}
.override .chips{display:flex;gap:8px;flex-wrap:wrap}

/* ---------- header ---------- */
header.hero{padding:26px 0 4px;text-align:left}
.brand{font-family:var(--mono);font-size:.72rem;letter-spacing:.22em;color:var(--pine)}
h1{font-family:var(--disp);font-weight:600;font-size:2.05rem;line-height:1.12;margin:6px 0 4px}
.sub{color:var(--ink-soft);font-size:.95rem;max-width:34ch}
.langtoggle{
  position:absolute;top:14px;right:16px;font-family:var(--mono);font-size:.74rem;
  border:1px solid var(--line);border-radius:999px;padding:6px 12px;background:var(--card)
}
.topbar{position:relative;max-width:480px;margin:0 auto}

/* ---------- chips ---------- */
.q{margin-top:22px}
.q .label{font-family:var(--mono);font-size:.7rem;letter-spacing:.18em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:8px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  border:1px solid var(--line);border-radius:999px;padding:10px 16px;
  background:var(--card);font-size:.92rem;transition:background .15s,color .15s
}
.chip[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip:active{transform:scale(.97)}

/* ---------- CTA ---------- */
.go{
  margin-top:26px;width:100%;border-radius:16px;padding:16px;
  background:var(--sun);color:var(--ink);font-family:var(--disp);
  font-size:1.25rem;font-weight:600;border:1px solid rgba(32,48,42,.2);
  box-shadow:0 2px 0 rgba(32,48,42,.25)
}
.go:active{transform:translateY(1px);box-shadow:none}

/* ---------- answer card ---------- */
.answer{display:none;margin-top:22px}
.answer.show{display:block;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.answer.show{animation:none}.ribbon{transition:none}}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;box-shadow:0 6px 24px rgba(32,48,42,.07)
}
.card .area{font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;color:var(--pine);text-transform:uppercase}
.card h2{font-family:var(--disp);font-weight:600;font-size:1.55rem;line-height:1.15;margin:6px 0 6px}
.card .why{font-size:.95rem;margin-bottom:10px}
.card .meta{font-size:.82rem;color:var(--ink-soft);display:flex;gap:10px;flex-wrap:wrap}
.card .meta .stars{color:var(--sun);font-weight:600;color:#B07F1E}
.relaxnote{font-size:.78rem;color:var(--lingon);margin-bottom:8px;display:none}
.relaxnote.show{display:block}
.cardbtns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn{
  border:1px solid var(--line);border-radius:12px;padding:11px 14px;
  background:var(--paper);font-size:.9rem;font-weight:600;text-decoration:none;color:var(--ink);
  display:inline-flex;align-items:center;gap:6px
}
.btn.primary{background:var(--pine);color:#fff;border-color:var(--pine)}

/* ---------- browse panels ---------- */
.browse{margin-top:34px}
.browse .label{font-family:var(--mono);font-size:.7rem;letter-spacing:.18em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:10px}
.panelchips{display:flex;gap:8px;flex-wrap:wrap}
.list{margin-top:14px;display:none;flex-direction:column;gap:8px}
.list.open{display:flex}
.row{
  width:100%;text-align:left;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px
}
.row .nm{font-weight:600;font-size:.95rem}
.row .ar{font-size:.78rem;color:var(--ink-soft)}
.row .rt{margin-left:auto;font-family:var(--mono);font-size:.8rem;color:#B07F1E;white-space:nowrap}

/* ---------- detail sheet ---------- */
.scrim{position:fixed;inset:0;background:rgba(32,48,42,.4);display:none;z-index:40}
.scrim.open{display:block}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:50;display:none;
  background:var(--card);border-radius:22px 22px 0 0;border-top:1px solid var(--line);
  max-width:520px;margin:0 auto;padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  max-height:82dvh;overflow:auto
}
.sheet.open{display:block;animation:rise .25s ease}
.sheet .grab{width:44px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 14px}
.sheet h2{font-family:var(--disp);font-size:1.4rem;margin:2px 0 6px}
.sheet .desc{font-size:.94rem;margin:8px 0 12px}
.fac{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fac span{font-size:.76rem;border:1px solid var(--line);border-radius:999px;padding:5px 10px;background:var(--paper)}
.hrs{font-size:.82rem;color:var(--ink-soft);margin-bottom:14px}

/* ---------- footer ---------- */
footer{margin-top:48px;border-top:1px solid var(--line);padding-top:22px;text-align:center}
.kofi{
  display:inline-block;background:#c9a84c;color:#20302A;font-weight:700;
  border-radius:999px;padding:11px 22px;text-decoration:none;font-size:.92rem

.socials{margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:.82rem}
.socials a{color:var(--ink-soft);text-decoration:none}
.socials a:hover{color:var(--pine)}
.stamp{margin-top:16px;font-family:var(--mono);font-size:.68rem;color:var(--ink-soft)}
</style>

    return '<path d="M9 16a8 8 0 0 1 15.5-2.5A6 6 0 0 1 24 25H11a5.5 5.5 0 0 1-2-9z" fill="#FFFDF8" stroke="'+stroke+'" stroke-width="1.4"/><g stroke="#3F7159" stroke-width="1.8" stroke-linecap="round"><line x1="13" y1="27" x2="12" y2="31"/><line x1="18" y1="27" x2="17" y2="31"/><line x1="23" y1="27" x2="22" y2="31"/></g>';
  if (b === "cold")
    return '<g stroke="'+stroke+'" stroke-width="1.6" stroke-linecap="round"><line x1="17" y1="5" x2="17" y2="29"/><line x1="7" y1="11" x2="27" y2="23"/><line x1="27" y1="11" x2="7" y2="23"/><line x1="17" y1="5" x2="14" y2="8"/><line x1="17" y1="5" x2="20" y2="8"/><line x1="17" y1="29" x2="14" y2="26"/><line x1="17" y1="29" x2="20" y2="26"/></g>';
  return '<path d="M8 18a8 8 0 0 1 15.5-2.5A6 6 0 0 1 23 27H10a5.5 5.5 0 0 1-2-9z" fill="#FFFDF8" stroke="'+stroke+'" stroke-width="1.4"/>';
}
function paintRibbon(){
  const t = T();
  const rb = $("ribbon");
  rb.className = "ribbon " + (bucket === "fine" ? "w-sun" : bucket === "wet" ? "w-wet" : bucket === "cold" ? "w-cold" : "w-gray");
  let condTxt, tempTxt;
  if (manualWeather){
    condTxt = t.cond.manual; tempTxt = bucket === "fine" ? "☀" : bucket === "wet" ? "🌧" : "❄";
  } else if (lastWeather){
    const k = condKey(lastWeather.code);
    condTxt = t.cond[k]; tempTxt = Math.round(lastWeather.temp) + "°C";
  } else {
    condTxt = t.cond.unknown; tempTxt = "–";
  }
  $("wtemp").textContent = tempTxt;
  $("wcond").textContent = condTxt + " · " + t.advice[bucket || "gray"];
  $("whint").textContent = t.whintTap;
  $("wicon").innerHTML = iconFor(bucket, lastWeather ? condKey(lastWeather.code) : "cloud");
}
function defaultBucketFromSeason(){
  const s = seasonNow();
  return s === "win" ? "cold" : s === "sum" ? "fine" : "gray";
}
async function fetchWeather(){
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 6000);
  try {
    const res = await fetch(WURL, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error("status " + res.status);
    const data = await res.json();
    const c = data.current;
    lastWeather = { temp: c.temperature_2m, precip: c.precipitation, code: c.weather_code };
    storeSafe("lt_weather", JSON.stringify({ ...lastWeather, ts: Date.now() }));
    weatherFailed = false;
    if (!manualWeather) bucket = toBucket(lastWeather.temp, lastWeather.precip, lastWeather.code);
  } catch (e) {
    clearTimeout(timer);
    weatherFailed = true;
    const cached = storeSafe("lt_weather");
    if (cached){
      try {
        const w = JSON.parse(cached);
        if (Date.now() - w.ts < 3 * 3600 * 1000){ /* trust cache for 3h */
          lastWeather = w;
          if (!manualWeather) bucket = toBucket(w.temp, w.precip, w.code);
          weatherFailed = false;
        }
      } catch(_){}
    }
    if (weatherFailed && !manualWeather && !bucket) bucket = defaultBucketFromSeason();
    if (weatherFailed) $("override").classList.add("open");
  }
  paintRibbon();
  $("ovtext").textContent = weatherFailed ? T().ovFail : T().ovManual;
}

/* ============ recommendation ============ */
function eligible(p, relaxTime){
  if (!p.ages.includes(age)) return false;
  if (!relaxTime && !p.time.includes(timeSel)) return false;
  const s = seasonNow();
  if (p.season === "sum" && s !== "sum") return false;
  if (bucket === "wet" && p.env === "out") return false;
  if (bucket === "cold" && p.env === "out" && !p.winter) return false;
  return true;
}
function score(p){
  let sc = p.r + Math.min(Math.log10(p.rc + 1), 3) * 0.35;
  if (bucket === "fine"){ if (p.env === "out") sc += 1.1; if (p.env === "in") sc -= 0.7; }
  if (bucket === "gray"){ if (p.env === "out" || p.env === "mix") sc += 0.4; }
  if (bucket === "wet" || bucket === "cold"){ if (p.env === "in") sc += 0.7; if (p.env === "mix") sc += 0.1; }
  if (bucket === "cold" && p.winter) sc += 1.0;
  const s = seasonNow();
  if (p.boost === s) sc += 0.7;
  sc += Math.random() * 0.5;
  return sc;
}
function buildCandidates(){
  relaxed = false;
  let pool = PLACES.filter(p => eligible(p, false));
  if (pool.length === 0){ pool = PLACES.filter(p => eligible(p, true)); relaxed = true; }
  if (pool.length === 0){ pool = PLACES.filter(p => p.ages.includes(age)); relaxed = true; }
  if (pool.length === 0){ pool = PLACES.slice(); relaxed = true; }
  candidates = pool.map(p => ({ p, s: score(p) })).sort((a, b) => b.s - a.s).map(x => x.p);
  candIdx = 0;
}
function showAnswer(){
  if (candidates.length === 0) buildCandidates();
  const p = candidates[candIdx % candidates.length];
  currentPlace = p;
  const t = T();
  $("relaxnote").textContent = t.relax;
  $("relaxnote").classList.toggle("show", relaxed);
  $("aArea").textContent = p.area;
  $("aName").textContent = p.n;
  $("aWhy").textContent = p.why[lang];
  $("aStars").textContent = "★ " + p.r.toFixed(1) + " · " + p.rc + " " + t.reviews;
  $("aHrs").textContent = p.hrs[lang];
  $("aMaps").href = mapsUrl(p);
  $("answer").classList.add("show");
  $("answer").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

/* ============ browse ============ */
const PANEL_FILTERS = [
  p => p.cats.includes("play") && p.env !== "in",
  p => p.env === "in",
  p => p.cats.includes("nature"),
  p => p.free,
  p => p.expat
];
function renderPanels(){
  const t = T();
  const wrap = $("panelChips");
  wrap.innerHTML = "";
  t.panels.forEach((label, i) => {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = label;
    b.setAttribute("aria-pressed", openPanel === i ? "true" : "false");
    b.addEventListener("click", () => { openPanel = openPanel === i ? -1 : i; renderPanels(); renderList(); });
    wrap.appendChild(b);
  });
}
function renderList(){
  const list = $("browseList");
  list.innerHTML = "";
  if (openPanel < 0){ list.classList.remove("open"); return; }
  const s = seasonNow();
  const items = PLACES.filter(PANEL_FILTERS[openPanel])
                      .filter(p => !(p.season === "sum" && s !== "sum"))
                      .sort((a, b) => b.r - a.r);
  items.forEach(p => {
    const row = document.createElement("button");
    row.className = "row";
    row.innerHTML = '<span><span class="nm">' + p.n + '</span><br><span class="ar">' + p.area + "</span></span>" +
                    '<span class="rt">★ ' + p.r.toFixed(1) + "</span>";
    row.addEventListener("click", () => openSheet(p));
    list.appendChild(row);
  });
  list.classList.add("open");
}

/* ============ detail sheet ============ */
function openSheet(p){
  currentPlace = p;
  const t = T();
  $("sArea").textContent = p.area;
  $("sName").textContent = p.n;
  $("sStars").textContent = "★ " + p.r.toFixed(1) + " · " + p.rc + " " + t.reviews;
  $("sDesc").textContent = p.desc[lang];
  const fac = $("sFac");
  fac.innerHTML = "";
  const tags = (p.free ? ["free"] : []).concat(p.fac || []);
  tags.forEach(k => {
    if (!t.fac[k]) return;
    const sp = document.createElement("span");
    sp.textContent = t.fac[k];
    fac.appendChild(sp);
  });
  $("sHrs").textContent = p.hrs[lang] + ". " + t.verify;
  $("sMaps").href = mapsUrl(p);
  $("sMaps").textContent = t.maps;
  $("sShare").textContent = t.share;
  $("sClose").textContent = t.close;
  $("scrim").classList.add("open");
  $("sheet").classList.add("open");
}
function closeSheet(){
  $("scrim").classList.remove("open");
  $("sheet").classList.remove("open");
}

/* ============ share card (native canvas) ============ */
function makeShareCard(p){
  const W = 1080, H = 1350;
  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const cx = cv.getContext("2d");
  cx.fillStyle = "#FBF7EF"; cx.fillRect(0, 0, W, H);
  const grad = cx.createLinearGradient(0, 0, W, 420);
  if (bucket === "fine"){ grad.addColorStop(0, "#FDE9B8"); grad.addColorStop(1, "#D8EAF3"); }
  else if (bucket === "wet"){ grad.addColorStop(0, "#C9D8E2"); grad.addColorStop(1, "#B3C7D4"); }
  else if (bucket === "cold"){ grad.addColorStop(0, "#EDF4F9"); grad.addColorStop(1, "#D7E4EE"); }
  else { grad.addColorStop(0, "#E6EAE7"); grad.addColorStop(1, "#D5DEE2"); }
  cx.fillStyle = grad; cx.fillRect(0, 0, W, 420);
  cx.fillStyle = "#F0B23E";
  cx.beginPath(); cx.arc(900, 130, 70, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = "#3F7159";
  cx.font = "600 34px ui-monospace, Menlo, monospace";
  cx.fillText("L I L L A   T I M M E N", 70, 110);
  cx.fillStyle = "#20302A";
  cx.font = "600 92px Fraunces, Georgia, serif";
  wrapText(cx, p.n, 70, 560, 940, 100);
  cx.font = "500 44px Fraunces, Georgia, serif";
  cx.fillStyle = "#3F7159";
  cx.fillText(p.area + " · Stockholm", 70, 700);
  cx.font = "400 40px system-ui, sans-serif";
  cx.fillStyle = "#20302A";
  wrapText(cx, p.why[lang], 70, 790, 940, 56);
  cx.fillStyle = "#B07F1E";
  cx.font = "600 44px system-ui, sans-serif";
  cx.fillText("★ " + p.r.toFixed(1), 70, 1050);
  cx.fillStyle = "rgba(32,48,42,.55)";
  cx.font = "400 30px ui-monospace, Menlo, monospace";
  cx.fillText(lang === "sv" ? "Vart ska vi i dag?" : "Where to today?", 70, 1240);
  cx.fillText("ko-fi.com/shamathakur", 70, 1290);
  return cv;
}
function wrapText(cx, text, x, y, maxW, lh){
  const words = String(text).split(" ");
  let line = "";
  for (const w of words){
    const test = line ? line + " " + w : w;
    if (cx.measureText(test).width > maxW && line){ cx.fillText(line, x, y); line = w; y += lh; }
    else line = test;
  }
  cx.fillText(line, x, y);
  return y;
}
async function shareCard(){
  if (!currentPlace) return;
  const cv = makeShareCard(currentPlace);
  cv.toBlob(async blob => {
    if (!blob) return;
    const file = new File([blob], "lilla-timmen.png", { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })){
      try { await navigator.share({ files: [file], title: "Lilla Timmen" }); return; } catch(e){}
    }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "lilla-timmen.png";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  }, "image/png");
}

/* ============ UI wiring ============ */
function renderChips(){
  const t = T();
  const ac = $("ageChips"); ac.innerHTML = "";
  t.ages.forEach((label, i) => {
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = label;
    b.setAttribute("aria-pressed", age === i ? "true" : "false");
    b.addEventListener("click", () => { age = i; renderChips(); candidates = []; });
    ac.appendChild(b);
  });
  const tc = $("timeChips"); tc.innerHTML = "";
  t.times.forEach((label, i) => {
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = label;
    b.setAttribute("aria-pressed", timeSel === i ? "true" : "false");
    b.addEventListener("click", () => { timeSel = i; renderChips(); candidates = []; });
    tc.appendChild(b);
  });
}
function renderStatic(){
  const t = T();
  document.documentElement.lang = lang;
  $("h1").textContent = t.h1;
  $("sub").textContent = t.sub;
  $("ageLabel").textContent = t.ageLabel;
  $("timeLabel").textContent = t.timeLabel;
  $("goBtn").textContent = t.go;
  $("aMaps").textContent = t.maps;
  $("aMore").textContent = t.more;
  $("aNext").textContent = t.next;
  $("browseLabel").textContent = t.browseLabel;
  $("langBtn").textContent = lang === "sv" ? "EN" : "SV";
  $("ovSun").textContent = t.ovSun;
  $("ovRain").textContent = t.ovRain;
  $("ovCold").textContent = t.ovCold;
  $("ovRetry").textContent = t.ovRetry;
  $("ovtext").textContent = weatherFailed ? t.ovFail : t.ovManual;
  renderChips();
  renderPanels();
  renderList();
  paintRibbon();
  if ($("answer").classList.contains("show") && currentPlace) showAnswer();
}
function init(){
  bucket = defaultBucketFromSeason();
  renderStatic();
  fetchWeather();
  $("langBtn").addEventListener("click", () => { lang = lang === "sv" ? "en" : "sv"; renderStatic(); });
  $("goBtn").addEventListener("click", () => { buildCandidates(); showAnswer(); });
  $("aNext").addEventListener("click", () => { candIdx++; showAnswer(); });
  $("aMore").addEventListener("click", () => { if (currentPlace) openSheet(currentPlace); });
  $("ribbon").addEventListener("click", () => $("override").classList.toggle("open"));
  document.querySelectorAll("[data-ov]").forEach(b => b.addEventListener("click", () => {
    const v = b.getAttribute("data-ov");
    if (v === "retry"){ manualWeather = false; fetchWeather(); }
    else { manualWeather = true; bucket = v; candidates = []; paintRibbon(); }
    $("ovtext").textContent = weatherFailed ? T().ovFail : T().ovManual;
  }));
  $("scrim").addEventListener("click", closeSheet);
  $("sClose").addEventListener("click", closeSheet);
  $("sShare").addEventListener("click", shareCard);
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeSheet(); });
}
init();
</script>
